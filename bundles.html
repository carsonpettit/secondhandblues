<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Bundles - Second Hand Blues</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Archivo+Narrow:wght@400;500;600&family=Allura&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --midnight: #0a0e27;
            --deep-blue: #1a2456;
            --electric-blue: #4a90e2;
            --rust: #d4634a;
            --cream: #f5f1e8;
            --silver: #c5c7d0;
            --shadow: rgba(10, 14, 39, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Archivo Narrow', sans-serif;
            background: white;
            color: var(--deep-blue);
            overflow-x: hidden;
        }

        /* Header */
        header {
            position: relative;
            padding: 2rem 4%;
            border-bottom: 2px solid #e0e0e0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        h1 {
            font-family: 'Allura', cursive;
            font-size: 3.5rem;
            font-weight: 400;
            letter-spacing: 1px;
            color: var(--deep-blue);
            animation: fadeInDown 0.8s ease-out;
        }

        h1 a {
            text-decoration: none;
            color: var(--deep-blue);
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        nav {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-menu {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-menu a {
            color: var(--deep-blue);
            text-decoration: none;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
            position: relative;
            transition: color 0.3s ease;
        }

        .nav-menu a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--electric-blue);
            transition: width 0.3s ease;
        }

        .nav-menu a:hover {
            color: var(--electric-blue);
        }

        .nav-menu a:hover::after,
        .nav-menu a.active::after {
            width: 100%;
        }

        .nav-menu a.active {
            color: var(--electric-blue);
        }

        /* Page Header */
        .page-header {
            padding: 4rem 4%;
            text-align: center;
        }

        .page-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            font-weight: 900;
            margin-bottom: 1rem;
            animation: fadeInUp 0.8s ease-out;
            color: var(--deep-blue);
        }

        .page-header p {
            font-size: 1.2rem;
            color: var(--deep-blue);
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        .bundle-intro {
            max-width: 700px;
            margin: 1.5rem auto 0;
            font-size: 1.3rem;
            line-height: 1.6;
        }

        /* Bundle Form */
        .bundle-form-section {
            padding: 2rem 4% 4rem;
        }

        .form-container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--deep-blue);
            padding: 3rem;
            border-radius: 12px;
            border: 1px solid var(--electric-blue);
        }

        .form-container h3 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: white;
            margin-bottom: 2rem;
            text-align: center;
        }

        .bundle-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 600;
            color: white;
            margin-bottom: 0.5rem;
            font-size: 1rem;
        }

        .form-group input[type="text"],
        .form-group input[type="email"],
        .form-group input[type="url"],
        .form-group select,
        .form-group textarea {
            padding: 0.75rem;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            font-family: 'Archivo Narrow', sans-serif;
            font-size: 1rem;
            transition: border-color 0.3s ease;
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--electric-blue);
            background: rgba(255, 255, 255, 0.15);
        }

        .form-group select {
            cursor: pointer;
        }

        .form-group select option {
            background: var(--deep-blue);
            color: white;
        }

        .bundle-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-top: 0.5rem;
        }

        .bundle-option {
            cursor: pointer;
        }

        .bundle-option input[type="radio"] {
            display: none;
        }

        .bundle-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 1.5rem;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            transition: all 0.3s ease;
            text-align: center;
        }

        .bundle-option input[type="radio"]:checked + .bundle-card {
            border-color: var(--electric-blue);
            background: rgba(74, 144, 226, 0.2);
        }

        .bundle-card:hover {
            border-color: var(--electric-blue);
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.15);
        }

        .bundle-card h4 {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            color: white;
            margin-bottom: 0.75rem;
        }

        .bundle-card ul {
            list-style: none;
            padding: 0;
            color: white;
        }

        .bundle-card li {
            padding: 0.25rem 0;
        }

        .bundle-card p {
            color: white;
            font-style: italic;
        }

        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: normal;
            cursor: pointer;
            color: white;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--electric-blue);
        }

        .submit-btn {
            padding: 1.2rem 3rem;
            background: white;
            color: var(--deep-blue);
            border: none;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }

        .submit-btn:hover {
            background: var(--electric-blue);
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(74, 144, 226, 0.4);
        }

        .submit-btn:active {
            transform: translateY(-1px);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* About Section */
        .about-section {
            padding: 4rem 4%;
            max-width: 900px;
            margin: 0 auto;
        }

        .about-content {
            background: #f5f5f5;
            padding: 3rem;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
            margin-bottom: 3rem;
            animation: fadeInUp 0.8s ease-out 0.4s both;
        }

        .about-content h3 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: var(--deep-blue);
            margin-bottom: 1.5rem;
        }

        .about-content p {
            font-size: 1.2rem;
            line-height: 1.8;
            color: var(--deep-blue);
            margin-bottom: 1.5rem;
        }

        .about-content p:last-child {
            margin-bottom: 0;
        }

        /* Values Grid */
        .values-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .value-card {
            background: #f5f5f5;
            padding: 2rem;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
            transition: all 0.3s ease;
            animation: fadeInUp 0.8s ease-out both;
        }

        .value-card:nth-child(1) { animation-delay: 0.6s; }
        .value-card:nth-child(2) { animation-delay: 0.7s; }
        .value-card:nth-child(3) { animation-delay: 0.8s; }

        .value-card:hover {
            transform: translateY(-8px);
            border-color: var(--electric-blue);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.1);
        }

        .value-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .value-card h4 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: var(--deep-blue);
            margin-bottom: 1rem;
        }

        .value-card p {
            color: var(--deep-blue);
            line-height: 1.6;
        }

        /* CTA Section */
        .cta-section {
            text-align: center;
            padding: 3rem;
            background: #f5f5f5;
            border-radius: 12px;
            border: 2px solid #e0e0e0;
            animation: fadeInUp 0.8s ease-out 0.9s both;
        }

        .cta-section h3 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            margin-bottom: 1rem;
            color: var(--deep-blue);
        }

        .cta-section p {
            font-size: 1.1rem;
            color: var(--deep-blue);
            margin-bottom: 2rem;
        }

        .cta-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .depop-link,
        .shop-link {
            display: inline-block;
            padding: 1rem 2rem;
            border-radius: 4px;
            text-decoration: none;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        .depop-link {
            background: var(--electric-blue);
            color: var(--cream);
        }

        .depop-link:hover {
            background: var(--rust);
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(212, 99, 74, 0.4);
        }

        .shop-link {
            background: transparent;
            color: var(--electric-blue);
            border: 2px solid var(--electric-blue);
        }

        .shop-link:hover {
            background: var(--electric-blue);
            color: var(--midnight);
            transform: scale(1.05);
        }

        /* Footer */
        footer {
            padding: 3rem 4%;
            border-top: none;
            text-align: center;
            color: white;
            margin-top: 4rem;
            background: var(--deep-blue);
        }

        footer p {
            margin-bottom: 1rem;
        }

        footer a {
            color: var(--electric-blue);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        footer a:hover {
            color: var(--rust);
        }

        .social-icons {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            align-items: center;
            margin-top: 1rem;
        }

        .social-icon {
            transition: transform 0.3s ease;
            display: inline-flex;
        }

        .social-icon:hover {
            transform: translateY(-3px);
        }

        .icon-circle {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: var(--deep-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s ease;
            border: none;
        }

        .icon-circle:hover {
            background: #f5f5f5;
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            .page-header h2 {
                font-size: 2.5rem;
            }

            .header-content {
                flex-wrap: wrap;
            }

            nav {
                gap: 1rem;
                width: 100%;
                justify-content: center;
                margin-top: 1rem;
            }

            .nav-menu {
                gap: 1.5rem;
                font-size: 0.85rem;
            }

            .about-content {
                padding: 2rem;
            }

            .form-container {
                padding: 2rem 1.5rem;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .bundle-options {
                grid-template-columns: 1fr;
            }

            .about-content p {
                font-size: 1.1rem;
            }

            .values-grid {
                grid-template-columns: 1fr;
            }

            .cta-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <div class="header-content">
            <h1><a href="index.html">Second Hand Blues</a></h1>
            <nav>
                <ul class="nav-menu">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="shop.html">Shop</a></li>
                    <li><a href="bundles.html" class="active">Custom Bundles</a></li>
                    <li><a href="about.html">About</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Page Header -->
    <div class="page-header">
        <h2>Custom Bundles</h2>
        <p class="bundle-intro">Let me bring your Pinterest board to life with a custom style bundle!</p>
    </div>

    <!-- Bundle Form Section -->
    <section class="bundle-form-section">
        <div class="form-container">
            <h3>Create Your Custom Bundle</h3>
            <form id="bundleForm" class="bundle-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName">First Name *</label>
                        <input type="text" id="firstName" name="firstName" required>
                    </div>
                    <div class="form-group">
                        <label for="lastName">Last Name *</label>
                        <input type="text" id="lastName" name="lastName" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="topSize">Top Size *</label>
                        <select id="topSize" name="topSize" required>
                            <option value="">Select size</option>
                            <option value="XS">XS</option>
                            <option value="S">S</option>
                            <option value="M">M</option>
                            <option value="L">L</option>
                            <option value="XL">XL</option>
                            <option value="XXL">XXL</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="bottomSize">Bottom Size *</label>
                        <select id="bottomSize" name="bottomSize" required>
                            <option value="">Select size</option>
                            <option value="XS">XS</option>
                            <option value="S">S</option>
                            <option value="M">M</option>
                            <option value="L">L</option>
                            <option value="XL">XL</option>
                            <option value="XXL">XXL</option>
                            <option value="24">24</option>
                            <option value="25">25</option>
                            <option value="26">26</option>
                            <option value="27">27</option>
                            <option value="28">28</option>
                            <option value="29">29</option>
                            <option value="30">30</option>
                            <option value="31">31</option>
                            <option value="32">32</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="pinterestLink">Link to Pinterest Inspo and/or Depop Likes</label>
                    <input type="url" id="pinterestLink" name="pinterestLink" placeholder="https://pinterest.com/...">
                </div>

                <div class="form-group">
                    <label>Pick a Bundle Size *</label>
                    <div class="bundle-options">
                        <label class="bundle-option">
                            <input type="radio" name="bundleSize" value="small" required>
                            <div class="bundle-card">
                                <h4>Small</h4>
                                <ul>
                                    <li>2 Tops</li>
                                    <li>1 Bottom</li>
                                </ul>
                            </div>
                        </label>
                        <label class="bundle-option">
                            <input type="radio" name="bundleSize" value="medium">
                            <div class="bundle-card">
                                <h4>Medium</h4>
                                <ul>
                                    <li>3 Tops</li>
                                    <li>1 Bottom</li>
                                    <li>1 Accessory</li>
                                </ul>
                            </div>
                        </label>
                        <label class="bundle-option">
                            <input type="radio" name="bundleSize" value="large">
                            <div class="bundle-card">
                                <h4>Large</h4>
                                <ul>
                                    <li>4 Tops</li>
                                    <li>2 Bottoms</li>
                                    <li>2 Accessories</li>
                                </ul>
                            </div>
                        </label>
                        <label class="bundle-option">
                            <input type="radio" name="bundleSize" value="custom">
                            <div class="bundle-card">
                                <h4>Custom Size</h4>
                                <p>Tell me what you want!</p>
                            </div>
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="preferences">Additional Preferences</label>
                    <textarea id="preferences" name="preferences" rows="5" placeholder="Tell me about your style preferences, colors you love, items you're looking for, or any other details..."></textarea>
                </div>

                <div class="form-group checkbox-group">
                    <label>
                        <input type="checkbox" name="zoomCall" value="yes">
                        I'd like to set up a Zoom call to chat about what I'm looking for
                    </label>
                </div>

                <button type="submit" class="submit-btn">Submit My Bundle Request</button>
            </form>
        </div>
    </section>

    <!-- About Section -->
    <section class="about-section">
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Second Hand Blues</p>
        <div class="social-icons">
            <a href="https://www.depop.com/secondhandblues/" target="_blank" class="social-icon depop-icon" title="Follow us on Depop">
                <div class="icon-circle">
                    <img src="depop-logo-navy.png" alt="Depop" style="width: 40px; height: 40px;">
                </div>
            </a>
            <a href="https://www.instagram.com/secondhandblues/" target="_blank" class="social-icon" title="Follow us on Instagram">
                <div class="icon-circle">
                    <svg viewBox="0 0 50 50" fill="none" xmlns="http://www.w3.org/2000/svg" style="width: 40px; height: 40px;">
                        <rect x="8" y="8" width="34" height="34" rx="8" stroke="#1a2456" stroke-width="3" fill="none"/>
                        <circle cx="25" cy="25" r="8" stroke="#1a2456" stroke-width="3" fill="none"/>
                        <circle cx="36" cy="14" r="2.5" fill="#1a2456"/>
                    </svg>
                </div>
            </a>
        </div>
    </footer>

    <script>
        // Bundle Form Submission
        const bundleForm = document.getElementById('bundleForm');

        bundleForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            // Get form data
            const formData = new FormData(bundleForm);
            const data = Object.fromEntries(formData);
            
            // In production, you would send this to your email or backend
            // For now, we'll show a confirmation message
            alert(`Thank you for your bundle request, ${data.firstName}! I'll be in touch soon via email at ${data.email} to discuss your custom bundle.`);
            
            // Reset form
            bundleForm.reset();
            
            // You can integrate with services like:
            // - EmailJS (https://www.emailjs.com/)
            // - Formspree (https://formspree.io/)
            // - Google Forms
            // - Your own backend
        });
    </script>
</body>
</html>
