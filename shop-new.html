    <style>
        :root {
            --deep-blue: #1a2456;
            --electric-blue: #4a90e2;

        /* Header */

            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        h1 {
            font-family: 'Allura', cursive;
            font-size: 3.5rem;
            font-weight: 400;
            letter-spacing: 1px;
            color: var(--deep-blue);
        }

        h1 a {
            text-decoration: none;
            color: var(--deep-blue);
        }

        nav {
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .nav-menu {
            list-style: none;
            display: flex;
            gap: 2rem;
        }

        .nav-menu a {
            text-decoration: none;
            color: var(--deep-blue);
            font-weight: 600;
            font-size: 1.1rem;
            transition: color 0.3s ease;
        }

        .nav-menu a:hover,
        .nav-menu a.active {
            color: var(--electric-blue);
        }

        /* Page Header */
        .page-header {
            padding: 4rem 4%;
            text-align: center;
            background: white;
        }

        .page-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--deep-blue);
            margin-bottom: 1rem;
        }

        .page-header p {
            font-size: 1.2rem;
            color: var(--deep-blue);
        }

        /* Products Section */
        .products-section {
            padding: 2rem 4% 4rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Footer */
        footer {
            background: var(--deep-blue);
            color: white;
            text-align: center;
            padding: 2rem 4%;
            margin-top: 4rem;
        }

        footer p {
            margin: 0.5rem 0;
        }

        footer a {
            color: var(--electric-blue);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        footer a:hover {
            color: var(--rust);
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            .page-header h2 {
                font-size: 2.5rem;
            }

            .header-content {
                flex-wrap: wrap;
            }

            nav {
                gap: 1rem;
                width: 100%;
                justify-content: center;
                margin-top: 1rem;
            }

            .nav-menu {
                gap: 1rem;
                font-size: 0.9rem;
            }
        }
    </style>
