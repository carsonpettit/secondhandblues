<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Second Hand Blues - Vintage Alternative Fashion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Archivo+Narrow:wght@400;500;600&family=Allura&display=swap" rel="stylesheet">
    
    <!-- Shopify Buy Button SDK -->
    <script src="https://sdks.shopifycdn.com/buy-button/latest/buy-button-storefront.min.js"></script>
    
    <style>
        :root {
            --midnight: #0a0e27;
            --deep-blue: #1a2456;
            --electric-blue: #4a90e2;
            --rust: #d4634a;
            --cream: #f5f1e8;
            --silver: #c5c7d0;
            --shadow: rgba(10, 14, 39, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Archivo Narrow', sans-serif;
            background: white;
            color: white;
            overflow-x: hidden;
            position: relative;
        }

        /* Full-page background image */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('clothing-rack.jpg');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            z-index: -2;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, -30px); }
        }

        /* Header */
        header {
            position: relative;
            padding: 2rem 4%;
            border-bottom: 2px solid #e0e0e0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        h1 {
            font-family: 'Allura', cursive;
            font-size: 3.5rem;
            font-weight: 400;
            letter-spacing: 1px;
            color: var(--deep-blue);
            animation: fadeInDown 0.8s ease-out;
        }

        h1 a {
            text-decoration: none;
            color: var(--deep-blue);
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        nav {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-menu {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-menu a {
            color: var(--deep-blue);
            text-decoration: none;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
            position: relative;
            transition: color 0.3s ease;
        }

        .nav-menu a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--electric-blue);
            transition: width 0.3s ease;
        }

        .nav-menu a:hover {
            color: var(--electric-blue);
        }

        .nav-menu a:hover::after,
        .nav-menu a.active::after {
            width: 100%;
        }

        .nav-menu a.active {
            color: var(--electric-blue);
        }

        .cart-button {
            background: var(--electric-blue);
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            color: var(--cream);
            font-weight: 600;
            cursor: pointer;
            position: relative;
            transition: all 0.3s ease;
            font-family: 'Archivo Narrow', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
        }

        .cart-button:hover {
            background: var(--rust);
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(212, 99, 74, 0.4);
        }

        /* Hero Section */
        .hero {
            padding: 8rem 4%;
            text-align: center;
            position: relative;
            overflow: hidden;
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero-content {
            position: relative;
            z-index: 1;
            max-width: 800px;
            margin: 0 auto;
        }

        .hero-content *,
        .hero-content h2,
        .hero-content p,
        section.hero *,
        section.hero h2,
        section.hero p,
        #home *,
        #home h2,
        #home p {
            color: white !important;
        }

        .hero h2 {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            animation: fadeInUp 1s ease-out 0.2s both;
            color: white !important;
            text-shadow: 
                0 2px 4px rgba(0, 0, 0, 0.9),
                0 4px 8px rgba(0, 0, 0, 0.7),
                0 8px 16px rgba(0, 0, 0, 0.5);
        }

        .hero p {
            font-size: 1.3rem;
            color: white !important;
            margin-bottom: 2rem;
            animation: fadeInUp 1s ease-out 0.4s both;
            text-shadow: 
                0 2px 4px rgba(0, 0, 0, 0.9),
                0 4px 8px rgba(0, 0, 0, 0.7);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .depop-link {
            display: inline-block;
            color: var(--electric-blue);
            text-decoration: none;
            font-weight: 600;
            padding: 0.5rem 1rem;
            border: 2px solid var(--electric-blue);
            border-radius: 4px;
            transition: all 0.3s ease;
            animation: fadeInUp 1s ease-out 0.6s both;
        }

        .depop-link:hover {
            background: var(--electric-blue);
            color: var(--midnight);
            transform: scale(1.05);
        }

        /* Shop Collection Button */
        .shop-collection-btn {
            display: inline-block;
            margin-top: 2rem;
            padding: 1.2rem 3rem;
            background: var(--deep-blue);
            color: white !important;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 50px;
            transition: all 0.4s ease;
            box-shadow: 0 4px 15px rgba(26, 36, 86, 0.3);
            border: 2px solid var(--deep-blue);
        }

        .shop-collection-btn:hover {
            background: var(--rust);
            border-color: var(--rust);
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 8px 25px rgba(212, 99, 74, 0.5);
            color: white !important;
        }

        .shop-collection-btn:active {
            transform: translateY(-2px) scale(1.02);
        }

        /* CTA Scroll Section */
        .cta-scroll-section {
            background: white;
            padding: 6rem 4%;
            text-align: center;
            color: var(--deep-blue);
            position: relative;
            z-index: 2;
        }

        .cta-scroll-section * {
            color: var(--deep-blue);
        }

        .cta-scroll-content {
            max-width: 800px;
            margin: 0 auto;
        }

        .cta-scroll-section h3 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--deep-blue);
            margin-bottom: 2rem;
        }

        /* Social Media Icons */
        .social-icons {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            align-items: center;
            margin-top: 1.5rem;
        }

        .social-icon {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--deep-blue);
            border-radius: 50%;
            transition: all 0.3s ease;
            border: 2px solid var(--electric-blue);
        }

        .social-icon.depop-icon {
            background: transparent;
            border: none;
        }

        .social-icon:hover {
            background: var(--electric-blue);
            transform: translateY(-5px) scale(1.1);
            box-shadow: 0 8px 20px rgba(74, 144, 226, 0.4);
        }

        .social-icon.depop-icon:hover {
            background: transparent;
            transform: translateY(-5px) scale(1.1);
        }

        .social-icon img {
            width: 28px;
            height: 28px;
            object-fit: contain;
        }

        /* Products Section */
        .products-section {
            padding: 4rem 4%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 3rem;
            text-align: center;
            color: var(--cream);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }

        #shopify-products-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }

        /* Shopify component styling overrides */
        .shopify-buy__product {
            background: var(--deep-blue) !important;
            border-radius: 8px !important;
            overflow: hidden !important;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1) !important;
            border: 1px solid rgba(74, 144, 226, 0.2) !important;
            padding: 0 !important;
        }

        .shopify-buy__product:hover {
            transform: translateY(-8px) !important;
            box-shadow: 0 12px 40px var(--shadow) !important;
            border-color: var(--electric-blue) !important;
        }

        .shopify-buy__product__variant-img {
            border-radius: 0 !important;
        }

        .shopify-buy__product__title {
            font-family: 'Playfair Display', serif !important;
            font-size: 1.3rem !important;
            font-weight: 700 !important;
            color: var(--cream) !important;
        }

        .shopify-buy__product__price {
            font-size: 1.5rem !important;
            font-weight: 700 !important;
            color: var(--electric-blue) !important;
        }

        .shopify-buy__btn {
            background: var(--rust) !important;
            color: var(--cream) !important;
            font-family: 'Archivo Narrow', sans-serif !important;
            text-transform: uppercase !important;
            letter-spacing: 0.5px !important;
            font-weight: 600 !important;
            border-radius: 4px !important;
            transition: all 0.3s ease !important;
        }

        .shopify-buy__btn:hover {
            background: var(--electric-blue) !important;
            transform: scale(1.05) !important;
        }

        .shopify-buy__cart-toggle {
            background: var(--electric-blue) !important;
            border-radius: 4px !important;
        }

        .shopify-buy__cart-toggle:hover {
            background: var(--rust) !important;
        }

        /* Loading state */
        .loading {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--silver);
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--deep-blue);
            border-top-color: var(--electric-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Clothing Rack Section */
        .clothing-rack-section {
            padding: 4rem 0;
            max-width: 1400px;
            margin: 0 auto;
        }

        .clothing-rack-image {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 0;
        }

        /* Setup Instructions */
        .setup-instructions {
            max-width: 800px;
            margin: 4rem auto;
            padding: 3rem;
            background: var(--deep-blue);
            border-radius: 12px;
            border: 2px solid var(--electric-blue);
        }

        .setup-instructions h3 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            margin-bottom: 1.5rem;
            color: var(--electric-blue);
        }

        .setup-instructions ol {
            margin-left: 1.5rem;
            line-height: 1.8;
        }

        .setup-instructions li {
            margin-bottom: 1rem;
            color: var(--silver);
        }

        .setup-instructions code {
            background: var(--midnight);
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            color: var(--electric-blue);
            font-family: monospace;
        }

        .setup-instructions strong {
            color: var(--cream);
        }

        .setup-instructions a {
            color: var(--electric-blue);
            text-decoration: none;
            border-bottom: 1px solid var(--electric-blue);
        }

        .setup-instructions a:hover {
            color: var(--rust);
            border-bottom-color: var(--rust);
        }

        /* Footer */
        footer {
            padding: 3rem 4%;
            border-top: 2px solid #e0e0e0;
            text-align: center;
            color: var(--deep-blue);
            margin-top: 4rem;
            background: white;
        }

        footer * {
            color: var(--deep-blue);
        }

        footer p {
            margin-bottom: 1rem;
        }

        footer a {
            color: var(--electric-blue);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        footer a:hover {
            color: var(--rust);
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            .hero h2 {
                font-size: 2.5rem;
            }

            .hero p {
                font-size: 1.1rem;
            }

            .header-content {
                flex-wrap: wrap;
            }

            nav {
                gap: 1rem;
                width: 100%;
                justify-content: space-between;
                margin-top: 1rem;
            }

            .nav-menu {
                gap: 1.5rem;
                font-size: 0.85rem;
            }

            /* Adjust background for mobile to keep jeans centered */
            body::after {
                background-position: center center;
            }

            .products-grid,
            #shopify-products-container {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                gap: 1.5rem;
            }

            .setup-instructions {
                padding: 2rem;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <div class="header-content">
            <h1><a href="index.html">Second Hand Blues</a></h1>
            <nav>
                <ul class="nav-menu">
                    <li><a href="index.html" class="active">Home</a></li>
                    <li><a href="shop.html">Shop</a></li>
                    <li><a href="bundles.html">Custom Bundles</a></li>
                    <li><a href="about.html">About</a></li>
                </ul>
                <!-- Shopify cart will be inserted here -->
                <div id="shopify-cart"></div>
            </nav>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero" id="home" style="color: white !important;">
        <div class="hero-content" style="color: white !important;">
            <h2 style="color: white !important;">Vintage Styles<br>Handpicked Just for You</h2>
            <p style="color: white !important;">Curated vintage, Y2K, & modern Eco-friendly clothes!</p>
        </div>
    </section>

    <!-- Call to Action Section -->
    <section class="cta-scroll-section">
        <div class="cta-scroll-content">
            <a href="shop.html" class="shop-collection-btn">Shop My Collection</a>
        </div>
    </section>

    <!-- Clothing Rack Section -->
    <section class="clothing-rack-section">
        <img src="new-hero-image.jpg" alt="Second Hand Blues collection" class="clothing-rack-image">
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Second Hand Blues. Vintage. Alternative. Yours.</p>
        <div class="social-icons">
            <a href="https://www.depop.com/secondhandblues/" target="_blank" class="social-icon depop-icon" title="Follow us on Depop">
                <img src="depop-logo-navy.png" alt="Depop" style="width: 50px; height: 50px;">
            </a>
            <a href="https://www.instagram.com/secondhandblues/" target="_blank" class="social-icon" title="Follow us on Instagram">
                <svg viewBox="0 0 50 50" fill="none" xmlns="http://www.w3.org/2000/svg" style="width: 50px; height: 50px;">
                    <rect x="8" y="8" width="34" height="34" rx="8" stroke="white" stroke-width="3" fill="none"/>
                    <circle cx="25" cy="25" r="8" stroke="white" stroke-width="3" fill="none"/>
                    <circle cx="36" cy="14" r="2.5" fill="white"/>
                </svg>
            </a>
        </div>
    </footer>

    <script>
        /*
         * SHOPIFY CONFIGURATION
         * Replace these values with your actual Shopify store details
         */
        const SHOPIFY_CONFIG = {
            domain: 'your-store.myshopify.com', // Replace with your Shopify domain
            storefrontAccessToken: 'your-storefront-access-token-here', // Replace with your token
            
            // Optional: Specify product IDs to display (leave empty to show all products)
            productIds: [
                // Add your Shopify product IDs here, for example:
                // 'gid://shopify/Product/1234567890',
                // 'gid://shopify/Product/0987654321',
            ],
            
            // Optional: Collection ID to display products from a specific collection
            collectionId: null, // e.g., 'gid://shopify/Collection/123456789'
        };

        // Initialize Shopify Buy Button
        function initializeShopify() {
            // Check if configuration is set
            if (SHOPIFY_CONFIG.domain === 'your-store.myshopify.com') {
                console.log('⚠️ Shopify not configured yet. Please update SHOPIFY_CONFIG with your store details.');
                return;
            }

            var client = ShopifyBuy.buildClient({
                domain: SHOPIFY_CONFIG.domain,
                storefrontAccessToken: SHOPIFY_CONFIG.storefrontAccessToken,
            });

            var ui = ShopifyBuy.UI.init(client);

            // Show products section, hide setup instructions
            document.getElementById('shop').style.display = 'block';
            document.querySelector('.setup-instructions').parentElement.style.display = 'none';

            // Load products
            if (SHOPIFY_CONFIG.productIds.length > 0) {
                // Load specific products
                SHOPIFY_CONFIG.productIds.forEach(productId => {
                    ui.createComponent('product', {
                        id: productId,
                        node: document.getElementById('shopify-products-container'),
                        options: {
                            product: {
                                styles: {
                                    product: {
                                        '@media (min-width: 601px)': {
                                            'max-width': 'calc(25% - 20px)',
                                            'margin-left': '20px',
                                            'margin-bottom': '50px',
                                            'width': 'calc(25% - 20px)',
                                        },
                                        'text-align': 'left',
                                    },
                                },
                                text: {
                                    button: 'Add to Cart',
                                },
                            },
                            cart: {
                                styles: {
                                    button: {
                                        'background-color': '#4a90e2',
                                        ':hover': {
                                            'background-color': '#d4634a',
                                        },
                                    },
                                },
                            },
                        },
                    });
                });
            } else if (SHOPIFY_CONFIG.collectionId) {
                // Load collection
                ui.createComponent('collection', {
                    id: SHOPIFY_CONFIG.collectionId,
                    node: document.getElementById('shopify-products-container'),
                    options: {
                        product: {
                            styles: {
                                product: {
                                    '@media (min-width: 601px)': {
                                        'max-width': 'calc(25% - 20px)',
                                        'margin-left': '20px',
                                        'margin-bottom': '50px',
                                    },
                                },
                            },
                            text: {
                                button: 'Add to Cart',
                            },
                        },
                    },
                });
            } else {
                // Load all products (requires GraphQL query - this is a simplified version)
                console.log('💡 To load all products, specify productIds or collectionId in SHOPIFY_CONFIG');
                document.getElementById('shopify-products-container').innerHTML = `
                    <div class="loading">
                        <p>Please configure productIds or collectionId to display products</p>
                    </div>
                `;
            }

            // Create cart
            ui.createComponent('cart', {
                node: document.getElementById('shopify-cart'),
                options: {
                    cart: {
                        styles: {
                            button: {
                                'background-color': '#4a90e2',
                                ':hover': {
                                    'background-color': '#d4634a',
                                },
                            },
                        },
                    },
                },
            });
        }

        // Initialize on page load
        if (typeof ShopifyBuy !== 'undefined') {
            initializeShopify();
        } else {
            console.error('Shopify Buy Button SDK failed to load');
        }
    </script>
</body>
</html>
